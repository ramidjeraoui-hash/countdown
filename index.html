<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العد التنازلي للخطوبة</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#f8f1f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.15);
    width:90%;
    max-width:500px;
}

h1{
    color:#d63384;
}

h2{
    color:#444;
}

#countdown{
    font-size:30px;
    font-weight:bold;
    color:#222;
    margin-top:20px;
    line-height:1.8;
}
</style>

</head>
<body>

<div class="card">
<h1>💍 العد التنازلي لموعد الخطوبة 💍</h1>
<h2>20 جويلية 2026 - الساعة 2:00 مساءً</h2>

<div id="countdown"></div>

</div>

<script>

var targetDate = new Date("July 20, 2026 14:00:00").getTime();

var timer = setInterval(function(){

var now = new Date().getTime();

var distance = targetDate - now;

if(distance < 0){
document.getElementById("countdown").innerHTML="🎉 ألف مبروك! حان موعد الخطوبة.";
clearInterval(timer);
return;
}

var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
var seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+" يوم<br>"+
hours+" ساعة<br>"+
minutes+" دقيقة<br>"+
seconds+" ثانية";

},1000);

</script>

</body>
</html>
